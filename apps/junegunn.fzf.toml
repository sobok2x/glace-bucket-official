[package]
id          = "junegunn.fzf"
name        = { en = "fzf", ko = "fzf" }
version     = "0.58.0"
description = { en = "A command-line fuzzy finder", ko = "퍼지 검색을 지원하는 CLI 파인더" }
homepage    = "https://github.com/junegunn/fzf"
license     = "MIT"
tags        = ["developer", "cli", "terminal", "search", "fuzzy"]

[installer]
url    = "https://github.com/junegunn/fzf/releases/download/v0.58.0/fzf-0.58.0-windows_amd64.zip"
sha256 = "PLACEHOLDER_RUN_glace-pack_fetch"
arch   = ["x64"]
type   = "zip"

[portable]
entry         = "fzf.exe"
persist_dirs  = []
env_overrides = {}

[autoupdate]
check_url       = "https://api.github.com/repos/junegunn/fzf/releases/latest"
version_pattern = '"tag_name":\s*"v([\d.]+)"'
